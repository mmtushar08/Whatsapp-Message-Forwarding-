version: '3.8'
services:
  forwarder:
    build:
      context: .
      dockerfile: apps/forwarder/Dockerfile
    container_name: whatsapp-forwarder
    ports:
      - "3000:3000"
    env_file:
      - apps/forwarder/.env
    restart: unless-stopped
    volumes:
      - ./apps/forwarder/logs:/app/logs
      - ./data:/app/data

  dashboard:
    build:
      context: .
      dockerfile: apps/dashboard/Dockerfile
    container_name: whatsapp-dashboard
    ports:
      - "5173:80"
    depends_on:
      - forwarder
    environment:
      - VITE_API_BASE_URL=http://forwarder:3000
